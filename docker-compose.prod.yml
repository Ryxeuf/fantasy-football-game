# Docker Compose - Production
# Utilise par le workflow de deploiement automatique.
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# Images : les services web/server tirent des images deja buildees sur GHCR
# (voir .github/workflows/deploy.yml). Le tag est pilote par la variable
# d'env IMAGE_TAG (defaut : latest). scripts/deploy.sh la positionne.

services:
  db:
    image: postgres:16
    restart: unless-stopped
    container_name: nufflearena_db
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-bb_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-bb_db}
      - TURNSTILE_SECRET_KEY=${TURNSTILE_SECRET_KEY}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - traefik-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bb_user} -d ${POSTGRES_DB:-bb_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: ghcr.io/ryxeuf/fantasy-football-game/web:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    container_name: nufflearena_web
    environment:
      - NODE_ENV=production
      - PORT=3100
      - NEXT_PUBLIC_API_BASE=https://api.nufflearena.fr
      - NEXT_PUBLIC_UMAMI_ENABLED=true
      - SERVER_API_BASE=http://nufflearena_server:8201
      - JWT_SECRET=${JWT_SECRET}
      # Freeze Pro League (cf docs/pro-league-freeze-2026-06-01.md). Le layout
      # server-component lit PRO_LEAGUE_ENABLED au runtime (redirect /pro-league).
      - PRO_LEAGUE_ENABLED=false
    networks:
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nufflearena.rule=Host(`nufflearena.fr`)"
      - "traefik.http.routers.nufflearena.entrypoints=websecure"
      - "traefik.http.routers.nufflearena.tls.certresolver=letsencrypt"
      - "traefik.http.routers.nufflearena.middlewares=secure-headers-embed@file,allow-embed-ryxeuf@file"
      - "traefik.http.routers.nufflearena.service=nufflearena"
      - "traefik.http.routers.nufflearena.priority=1"
      - "traefik.http.services.nufflearena.loadbalancer.server.port=3100"
      - "traefik.docker.network=traefik-network"
    depends_on:
      server:
        condition: service_started
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s

  server:
    image: ghcr.io/ryxeuf/fantasy-football-game/server:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    container_name: nufflearena_server
    environment:
      - NODE_ENV=production
      - API_PORT=8201
      - DATABASE_URL=postgresql://${POSTGRES_USER:-bb_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-bb_db}?schema=public
      - JWT_SECRET=${JWT_SECRET}
      - MATCH_SECRET=${MATCH_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - KOFI_VERIFICATION_TOKEN=${KOFI_VERIFICATION_TOKEN}
      # Upload images blog (cf. routes/admin-blog.ts POST /upload). Le serveur
      # stocke ET sert lui-meme les images (conteneurs web/server separes, Next
      # ne voit pas ces fichiers) : dossier persiste sur le volume blog_uploads,
      # URLs renvoyees absolues sur l'hote API.
      - BLOG_UPLOAD_DIR=/data/blog-images
      - BLOG_ASSET_PUBLIC_BASE=https://api.nufflearena.fr
      # Log every HTTP request to stdout so Loki can index them. Slow calls
      # still emit at warn level; without this flag Loki has no stream to
      # surface because the server is otherwise silent in steady state.
      - REQUEST_LOG=1
      # Freeze Pro League : coupe les crons pro-league + 404 routes /pro-league.
      # Degeler = "true". Voir docs/pro-league-freeze-2026-06-01.md.
      - PRO_LEAGUE_ENABLED=false
      # E-mail transactionnel (invitations de ligue, digest, etc.). Renseigner
      # ces variables dans le `.env` de prod pour activer l'envoi réel. Si
      # SMTP_HOST est vide, le mailer dégrade proprement (e-mails loggés only).
      # Voir docs/email.md.
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_SECURE=${SMTP_SECURE:-}
      - MAIL_FROM=${MAIL_FROM:-Nuffle Arena <no-reply@nufflearena.fr>}
    networks:
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nufflearena-api.rule=Host(`api.nufflearena.fr`)"
      - "traefik.http.routers.nufflearena-api.entrypoints=websecure"
      - "traefik.http.routers.nufflearena-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.nufflearena-api.middlewares=secure-headers-embed@file,allow-embed-ryxeuf@file"
      - "traefik.http.routers.nufflearena-api.service=nufflearena-api"
      - "traefik.http.routers.nufflearena-api.priority=1"
      - "traefik.http.services.nufflearena-api.loadbalancer.server.port=8201"
      # Route les POST Ko-fi envoyes sur nufflearena.fr/webhooks/kofi vers le serveur Express
      - "traefik.http.routers.nufflearena-kofi.rule=Host(`nufflearena.fr`) && PathPrefix(`/webhooks/kofi`)"
      - "traefik.http.routers.nufflearena-kofi.entrypoints=websecure"
      - "traefik.http.routers.nufflearena-kofi.tls.certresolver=letsencrypt"
      - "traefik.http.routers.nufflearena-kofi.service=nufflearena-api"
      - "traefik.http.routers.nufflearena-kofi.priority=100"
      - "traefik.docker.network=traefik-network"
    volumes:
      # Persiste les images de blog uploadees entre les redeploys (l'image
      # server est immutable et rebuildee a chaque deploy).
      - blog_uploads:/data/blog-images
    depends_on:
      db:
        condition: service_healthy
    # NOTE : `prisma db push` n'est plus dans le CMD. Il est execute en
    # one-shot par scripts/db-migrate.sh avant le swap, pour :
    #  1) accelerer le cold-start du container (moins de risque de timeout
    #     healthcheck et fenetre de bascule plus courte).
    #  2) garder le contrele de l'ordre migration / swap cote deploy.sh.
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8201/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 45s

volumes:
  db_data:
  blog_uploads:

networks:
  traefik-network:
    external: true
