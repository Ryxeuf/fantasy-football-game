# Docker Compose - Production
# Utilisé par le workflow de déploiement automatique
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  db:
    image: postgres:16
    restart: unless-stopped
    container_name: nufflearena_db
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-bb_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-bb_db}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - traefik-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bb_user} -d ${POSTGRES_DB:-bb_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    container_name: nufflearena_web
    environment:
      - NODE_ENV=development
      - PORT=3100
      - NEXT_PUBLIC_API_BASE=https://api.nufflearena.fr
      - NEXT_PUBLIC_UMAMI_ENABLED=true
      - SERVER_API_BASE=http://nufflearena_server:8201
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nufflearena.rule=Host(`nufflearena.fr`)"
      - "traefik.http.routers.nufflearena.entrypoints=websecure"
      - "traefik.http.routers.nufflearena.tls.certresolver=letsencrypt"
      - "traefik.http.routers.nufflearena.middlewares=secure-headers-embed@file,allow-embed-ryxeuf@file"
      - "traefik.http.routers.nufflearena.service=nufflearena"
      - "traefik.http.routers.nufflearena.priority=1"
      - "traefik.http.services.nufflearena.loadbalancer.server.port=3100"
      - "traefik.docker.network=traefik-network"
    depends_on:
      server:
        condition: service_started
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: unless-stopped
    container_name: nufflearena_server
    environment:
      - NODE_ENV=production
      - API_PORT=8201
      - DATABASE_URL=postgresql://${POSTGRES_USER:-bb_user}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-bb_db}?schema=public
      - JWT_SECRET=${JWT_SECRET}
      - MATCH_SECRET=${MATCH_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - KOFI_VERIFICATION_TOKEN=${KOFI_VERIFICATION_TOKEN}
    networks:
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nufflearena-api.rule=Host(`api.nufflearena.fr`)"
      - "traefik.http.routers.nufflearena-api.entrypoints=websecure"
      - "traefik.http.routers.nufflearena-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.nufflearena-api.middlewares=secure-headers-embed@file,allow-embed-ryxeuf@file"
      - "traefik.http.routers.nufflearena-api.service=nufflearena-api"
      - "traefik.http.routers.nufflearena-api.priority=1"
      - "traefik.http.services.nufflearena-api.loadbalancer.server.port=8201"
      # Route les POST Ko-fi envoyes sur nufflearena.fr/webhooks/kofi vers le serveur Express
      - "traefik.http.routers.nufflearena-kofi.rule=Host(`nufflearena.fr`) && PathPrefix(`/webhooks/kofi`)"
      - "traefik.http.routers.nufflearena-kofi.entrypoints=websecure"
      - "traefik.http.routers.nufflearena-kofi.tls.certresolver=letsencrypt"
      - "traefik.http.routers.nufflearena-kofi.service=nufflearena-api"
      - "traefik.http.routers.nufflearena-kofi.priority=100"
      - "traefik.docker.network=traefik-network"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
        npx prisma generate --schema /app/prisma/schema.prisma &&
        npx prisma db push --schema /app/prisma/schema.prisma --skip-generate --accept-data-loss &&
        pnpm --filter @bb/server run dev:nowatch
      "
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8201/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  db_data:

networks:
  traefik-network:
    external: true
