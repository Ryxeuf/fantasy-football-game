server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Toutes les requetes retournent 503 avec la page de maintenance
    location / {
        try_files /index.html =503;
        # Force le code 503 Service Unavailable
        error_page 503 /index.html;
        return 503;
    }

    # Sert la page HTML meme en 503
    error_page 503 @maintenance;
    location @maintenance {
        rewrite ^(.*)$ /index.html break;
    }

    # Health check pour le container lui-meme
    location /health {
        access_log off;
        return 200 '{"status":"maintenance"}';
        add_header Content-Type application/json;
    }
}
