server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Sert la page de maintenance sur toutes les routes
    location / {
        try_files /index.html =404;
    }

    # Health check pour le container
    location /health {
        access_log off;
        return 200 '{"status":"maintenance"}';
        add_header Content-Type application/json;
    }
}
