# Docker Compose - Page de maintenance
# Usage: docker compose -f docker-compose.maintenance.yml up -d
# La priorite Traefik (10) est superieure a celle des services (1),
# donc tout le trafic est redirige vers cette page quand le container tourne.

services:
  maintenance:
    image: nginx:alpine
    container_name: nufflearena_maintenance
    restart: unless-stopped
    volumes:
      - ./maintenance/index.html:/usr/share/nginx/html/index.html:ro
      - ./maintenance/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - traefik-network
    labels:
      # Route web (nufflearena.fr) - priorite haute
      - "traefik.enable=true"
      - "traefik.http.routers.nufflearena-maintenance.rule=Host(`nufflearena.fr`)"
      - "traefik.http.routers.nufflearena-maintenance.entrypoints=websecure"
      - "traefik.http.routers.nufflearena-maintenance.tls.certresolver=letsencrypt"
      - "traefik.http.routers.nufflearena-maintenance.priority=10"
      - "traefik.http.routers.nufflearena-maintenance.service=nufflearena-maintenance"
      # Route API (api.nufflearena.fr) - priorite haute
      - "traefik.http.routers.nufflearena-api-maintenance.rule=Host(`api.nufflearena.fr`)"
      - "traefik.http.routers.nufflearena-api-maintenance.entrypoints=websecure"
      - "traefik.http.routers.nufflearena-api-maintenance.tls.certresolver=letsencrypt"
      - "traefik.http.routers.nufflearena-api-maintenance.priority=10"
      - "traefik.http.routers.nufflearena-api-maintenance.service=nufflearena-maintenance"
      # Service commun
      - "traefik.http.services.nufflearena-maintenance.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik-network"

networks:
  traefik-network:
    external: true
