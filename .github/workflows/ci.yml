name: CI
on:
  pull_request:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
env:
  # Force tous les feature flags à ON pour la CI (build, lint, tests).
  # Cf. apps/server/src/services/featureFlags.ts
  FEATURE_FLAGS_FORCE_ENABLED: "true"
  # Workaround GitHub Actions deprecation Node 20 (juin 2026 → forced
  # default Node 24, sept 2026 → Node 20 retire du runner). Opt-in
  # immediat des actions JS (checkout/setup-node/etc.) sur Node 24
  # pour valider et eviter le warning "may not work as expected".
  # Voir https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: "pnpm" }
      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            **/node_modules
            .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm -w run typecheck || echo "No explicit typecheck scripts in some packages"
      - name: Build
        run: pnpm build
      - name: Unit tests
        # Les workspaces e2e/integration (`@bb/tests-*`) ont besoin d'infra
        # specifique (DB, browsers Playwright) qui n'est pas presente sur
        # ce runner — leurs jobs dedies tournent dans `e2e.yml`. On garde
        # donc le fallback historique pour ne pas casser la step.
        run: pnpm -w test || echo "Some workspaces require infra unavailable here (e2e jobs run in e2e.yml)"
      - name: Coverage thresholds (S25.4)
        # Seuils de couverture par package (cf. vitest.config.ts de
        # chaque workspace). Echec CI si la couverture passe en dessous
        # du baseline. Cibles 70% web/server / 85% game-engine seront
        # atteintes par paliers.
        # Filtre explicite : seulement les 4 workspaces qui ont un
        # provider coverage installe (les `@bb/tests-*` n'en ont pas).
        run: |
          pnpm --filter @bb/server \
               --filter @bb/web \
               --filter @bb/ui \
               --filter @bb/game-engine \
               run test:coverage
