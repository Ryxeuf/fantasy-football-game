name: CI
on:
  pull_request:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
env:
  # Force tous les feature flags à ON pour la CI (build, lint, tests).
  # Cf. apps/server/src/services/featureFlags.ts
  FEATURE_FLAGS_FORCE_ENABLED: "true"
jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: "pnpm" }
      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            **/node_modules
            .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}-
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm -w run typecheck || echo "No explicit typecheck scripts in some packages"
      - name: Build
        run: pnpm build
      - name: Unit tests
        run: pnpm -w test
      - name: Coverage thresholds (S25.4)
        # Lance la suite avec --coverage. Les seuils par package sont
        # definis dans chaque `vitest.config.ts` via `coverage.thresholds`.
        # Echec CI si la couverture passe en dessous du baseline ; les
        # cibles 70% web/server, 85% game-engine seront atteintes par
        # paliers (cf. roadmap S25.4).
        run: pnpm -w test -- --coverage
