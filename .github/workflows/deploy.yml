name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

# Un seul déploiement à la fois
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # Étape 1 : Vérifier que le build passe avant de déployer
  build-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: "pnpm" }
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck || true
      - name: Build
        run: pnpm build
      - name: Tests
        run: pnpm test || true

  # Étape 2 : Déployer sur le serveur
  deploy:
    runs-on: ubuntu-latest
    needs: build-check
    timeout-minutes: 10
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            echo "=== Déploiement Nuffle Arena ==="

            # Se placer dans le répertoire du projet
            cd ${{ secrets.DEPLOY_PATH || '~/fantasy-football-game' }}

            # Sauvegarder l'état actuel en cas de rollback
            PREVIOUS_COMMIT=$(git rev-parse HEAD)
            echo "Commit précédent: $PREVIOUS_COMMIT"

            # Pull les dernières modifications
            echo "📥 Pull des derniers changements..."
            git fetch origin main
            git reset --hard origin/main

            # Rebuild et redémarrage des containers (mode production)
            echo "🐳 Rebuild et redémarrage des services..."
            docker compose -f docker-compose.prod.yml build --no-cache
            docker compose -f docker-compose.prod.yml up -d

            # Attendre que les services soient prêts
            echo "⏳ Attente du démarrage des services..."
            sleep 15

            # Vérifier que les services sont en bonne santé
            echo "🏥 Vérification de la santé des services..."
            WEB_STATUS=$(docker compose -f docker-compose.prod.yml ps web --format "{{.Status}}" | head -1)
            SERVER_STATUS=$(docker compose -f docker-compose.prod.yml ps server --format "{{.Status}}" | head -1)

            if echo "$WEB_STATUS" | grep -q "Up" && echo "$SERVER_STATUS" | grep -q "Up"; then
              echo "✅ Déploiement réussi!"
              echo "Web: $WEB_STATUS"
              echo "Server: $SERVER_STATUS"
            else
              echo "❌ Problème détecté, rollback..."
              git reset --hard $PREVIOUS_COMMIT
              docker compose -f docker-compose.prod.yml build --no-cache
              docker compose -f docker-compose.prod.yml up -d
              echo "⚠️ Rollback effectué vers $PREVIOUS_COMMIT"
              exit 1
            fi

      - name: Notify deployment status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅' : '❌';
            const message = `${status} Déploiement ${context.sha.substring(0, 7)} : ${{ job.status }}`;
            console.log(message);

            // Créer un deployment status sur GitHub
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              auto_merge: false,
              required_contexts: [],
              description: `Deploy ${context.sha.substring(0, 7)}`,
            });

            if (deployment.data.id) {
              await github.rest.repos.createDeploymentStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: deployment.data.id,
                state: '${{ job.status }}' === 'success' ? 'success' : 'failure',
                environment_url: 'https://nufflearena.fr',
                description: message,
              });
            }
