name: Auto-merge PR

on:
  # Se déclenche quand le workflow CI est terminé (évite le race condition)
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  # Se déclenche aussi quand un review est soumis (approbation)
  pull_request_review:
    types: [submitted]
  # Permet de gérer les PRs qui ont le label auto-merge
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Ne s'exécute que si la PR est vers main (ou workflow_run après CI)
    if: >
      (github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main') ||
      (github.event_name == 'pull_request_review' && github.event.pull_request.base.ref == 'main') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - name: Enable auto-merge for PRs with passing checks
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Récupérer les PRs ouvertes vers main
            const pulls = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              base: 'main',
            });

            for (const pr of pulls.data) {
              console.log(`Checking PR #${pr.number}: ${pr.title}`);

              // Vérifier les labels - skip si "no-auto-merge"
              const hasNoAutoMerge = pr.labels.some(l => l.name === 'no-auto-merge');
              if (hasNoAutoMerge) {
                console.log(`  PR #${pr.number} has 'no-auto-merge' label, skipping`);
                continue;
              }

              // Vérifier le statut des checks
              const checks = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: pr.head.sha,
              });

              const ciCheck = checks.data.check_runs.find(c => c.name === 'ci');

              if (!ciCheck) {
                console.log(`  PR #${pr.number}: CI check not found yet, skipping`);
                continue;
              }

              if (ciCheck.status !== 'completed' || ciCheck.conclusion !== 'success') {
                console.log(`  PR #${pr.number}: CI not passing (status: ${ciCheck.status}, conclusion: ${ciCheck.conclusion})`);
                continue;
              }

              // Vérifier si la PR est mergeable
              const prDetail = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
              });

              if (prDetail.data.mergeable_state === 'clean' || prDetail.data.mergeable_state === 'unstable') {
                console.log(`  PR #${pr.number}: All checks passed, merging...`);
                try {
                  await github.rest.pulls.merge({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: pr.number,
                    merge_method: 'squash',
                    commit_title: `${pr.title} (#${pr.number})`,
                  });
                  console.log(`  PR #${pr.number}: Merged successfully!`);

                  // Supprimer la branche source après merge
                  try {
                    await github.rest.git.deleteRef({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      ref: `heads/${pr.head.ref}`,
                    });
                    console.log(`  Branch ${pr.head.ref} deleted`);
                  } catch (e) {
                    console.log(`  Could not delete branch: ${e.message}`);
                  }
                } catch (e) {
                  console.log(`  Failed to merge PR #${pr.number}: ${e.message}`);
                }
              } else {
                console.log(`  PR #${pr.number}: Not mergeable (state: ${prDetail.data.mergeable_state})`);
              }
            }
