services:
  db:
    image: postgres:16
    restart: unless-stopped
    container_name: nufflearena_db
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=bb_user
      - POSTGRES_PASSWORD=bb_pass
      - POSTGRES_DB=bb_db
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - traefik-network
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    ports:
      - "8200:3100"
    container_name: nufflearena_web
    init: true
    environment:
      - NODE_ENV=development
      - PORT=3100
      - NEXT_PUBLIC_API_BASE=https://api.nufflearena.fr
      - SERVER_API_BASE=http://nufflearena_server:8201
      # Force polling so chokidar/Next picks up file changes through the
      # bind mount on macOS/Windows hosts where inotify events are lost.
      - CHOKIDAR_USEPOLLING=1
      - WATCHPACK_POLLING=true
    volumes:
      # S24.9 hot-reload : bind mount du workspace + anonymous volumes
      # pour preserver les binaires node_modules Linux du conteneur et
      # eviter qu'un node_modules cote hote (macOS/Windows) ne les ecrase.
      - .:/app
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/apps/server/node_modules
      - /app/packages/game-engine/node_modules
      - /app/packages/ui/node_modules
      - /app/apps/web/.next
    working_dir: /app
    command: >
      sh -c "
        pnpm install &&
        pnpm run dev:web
      "
    networks:
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nufflearena.rule=Host(`nufflearena.fr`)"
      - "traefik.http.routers.nufflearena.entrypoints=websecure"
      - "traefik.http.routers.nufflearena.tls.certresolver=letsencrypt"
      - "traefik.http.routers.nufflearena.middlewares=secure-headers-embed@file,allow-embed-ryxeuf@file"
      - "traefik.http.routers.nufflearena.service=nufflearena"
      - "traefik.http.routers.nufflearena.priority=1"
      - "traefik.http.services.nufflearena.loadbalancer.server.port=3100"
      - "traefik.http.routers.nufflearena-local.rule=Host(`nufflearena.local`)"
      - "traefik.http.routers.nufflearena-local.entrypoints=web"
      - "traefik.http.routers.nufflearena-local.service=nufflearena-local"
      - "traefik.http.services.nufflearena-local.loadbalancer.server.port=3100"
      - "traefik.docker.network=traefik-network"
    depends_on:
      - server
      - db

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: unless-stopped
    container_name: nufflearena_server
    init: true
    healthcheck:
      disable: true
    ports:
      - "8201:8201"
    environment:
      - NODE_ENV=development
      - API_PORT=8201
      - DATABASE_URL=postgresql://bb_user:bb_pass@db:5432/bb_db?schema=public
      - CORS_ORIGINS=https://nufflearena.fr,http://localhost:3100
      - RATE_LIMIT_WHITELIST=82.67.200.127
      # tsx watch utilise chokidar en interne — polling necessaire si le
      # host n'emet pas d'evenements inotify a travers le bind mount.
      - CHOKIDAR_USEPOLLING=1
      - TSX_WATCH_POLL=1
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/apps/server/node_modules
      - /app/packages/game-engine/node_modules
      - /app/packages/ui/node_modules
    working_dir: /app/apps/server
    networks:
      - traefik-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nufflearena-api.rule=Host(`api.nufflearena.fr`)"
      - "traefik.http.routers.nufflearena-api.entrypoints=websecure"
      - "traefik.http.routers.nufflearena-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.nufflearena-api.middlewares=secure-headers-embed@file,allow-embed-ryxeuf@file"
      - "traefik.http.routers.nufflearena-api.service=nufflearena-api"
      - "traefik.http.routers.nufflearena-api.priority=1"
      - "traefik.http.services.nufflearena-api.loadbalancer.server.port=8201"
      - "traefik.docker.network=traefik-network"
    command: >
      sh -c "
        pnpm -w prisma generate &&
        pnpm run dev
      "


volumes:
  db_data:
networks:
  traefik-network:
    external: true
